name: Build NOVA OS Bootable ISO

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'distro/**'

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin grub-common grub2-common \
            mtools dosfstools debian-archive-keyring

      - name: Build NOVA OS ISO
        run: |
          cd distro
          sudo bash build.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nova-os-bootable-iso
          path: distro/output/nova-os.iso
          retention-days: 30
          if-no-files-found: error

      - name: Show ISO info
        run: |
          ls -lh distro/output/nova-os.iso
          echo "NOVA OS bootable ISO ready for download!"
