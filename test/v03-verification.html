<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astrion v0.3 Offline Verification</title>
<style>
  body { background: #1e1e2e; color: #eee; font-family: -apple-system, system-ui, sans-serif;
         padding: 24px; line-height: 1.5; max-width: 900px; margin: 0 auto; }
  h1 { color: #fff; margin: 0 0 12px; font-size: 22px; }
  h2 { color: #cba6f7; margin: 20px 0 8px; font-size: 14px; text-transform: uppercase;
       letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 4px; }
  .test { padding: 6px 10px; margin: 2px 0; border-radius: 6px;
          font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
  .pass { background: rgba(166,227,161,0.10); color: #a6e3a1; }
  .fail { background: rgba(243,139,168,0.15); color: #f38ba8; }
  .pending { background: rgba(250,179,135,0.10); color: #fab387; }
  .summary { margin-top: 24px; padding: 14px 18px; border-radius: 10px;
             background: #313244; font-size: 16px; }
  .err { color: #f38ba8; font-size: 11px; margin-left: 24px; opacity: 0.9; }
  code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .legend { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 16px; }
</style>
</head>
<body>
<h1>Astrion v0.3 Offline Verification</h1>
<p class="legend">
  Runs every layer of v0.3 (planner, executor, calibration, budget, math parser, brain detection)
  against a stubbed AI so it never needs an API key. Refresh to re-run.
  Open the JS console for full traces.
</p>
<div id="results"></div>
<div id="summary" class="summary">Running tests…</div>

<script type="module">
// ─── Force offline path so no real network calls fire ───
localStorage.setItem('nova-ai-provider', 'mock');

const results = document.getElementById('results');
let passCount = 0, failCount = 0;
const failures = [];

function section(title) {
  const h = document.createElement('h2');
  h.textContent = title;
  results.appendChild(h);
}
function record(name, ok, err) {
  const div = document.createElement('div');
  div.className = 'test ' + (ok ? 'pass' : 'fail');
  div.innerHTML = (ok ? '✓ ' : '✗ ') + name;
  if (!ok && err) {
    const e = document.createElement('div');
    e.className = 'err';
    e.textContent = String(err);
    div.appendChild(e);
    failures.push({ name, err: String(err) });
  }
  results.appendChild(div);
  ok ? passCount++ : failCount++;
}
async function test(name, fn) {
  try {
    const result = await fn();
    if (result === false) record(name, false, 'returned false');
    else record(name, true);
  } catch (err) {
    record(name, false, err?.message || err);
    console.error('[test failed]', name, err);
  }
}

// ═══ 1. Math parser (safeMathEval, replaces Function() eval) ═══
section('1. Safe math parser (replaces Function() eval)');

// Trigger module load via a dynamic import. Math parser is internal, so we
// exercise it through aiService._mockResponse which calls it.
const { aiService } = await import('/js/kernel/ai-service.js');
function mockMath(expr) {
  // _mockResponse looks for "what is/calculate/compute X" or bare expr
  const reply = aiService._mockResponse(expr);
  // Reply format: "EXPR = NUM" if math worked
  const m = reply.match(/= (-?[\d.]+)$/);
  return m ? parseFloat(m[1]) : null;
}
await test('1+1 = 2', () => mockMath('1+1') === 2);
await test('42 * 17 = 714', () => mockMath('42 * 17') === 714);
await test('(2 + 3) * 4 = 20', () => mockMath('(2 + 3) * 4') === 20);
await test('100 / 4 - 5 = 20', () => mockMath('100 / 4 - 5') === 20);
await test('-5 + 10 = 5', () => mockMath('-5 + 10') === 5);
await test('what is 7 * 8 = 56', () => mockMath('what is 7 * 8') === 56);
await test('rejects bad input (alphabet) returns offline msg', () => {
  const r = aiService._mockResponse('eval window');
  return !/= /.test(r); // should NOT have a "= X" math reply
});
await test('exponent: 2 ** 10 = 1024', () => mockMath('2 ** 10') === 1024);
await test('exponent caret: 3^4 = 81', () => mockMath('3^4') === 81);
await test('exponent right-assoc: 2^3^2 = 512', () => mockMath('2^3^2') === 512);
await test('mixed: (1+2)^3 = 27', () => mockMath('(1+2)^3') === 27);

// ═══ 2. Budget manager ═══
section('2. Budget manager (M3.P2)');

const budget = await import('/js/kernel/budget-manager.js');
budget.resetBudget();

await test('default daily cap is $0.50', () => budget.getDailyCap() === 0.50);
await test('default per-intent cap is $0.05', () => budget.getPerIntentCap() === 0.05);
await test('checkBudget allows tiny call', () => {
  const r = budget.checkBudget({ inputTokens: 100, outputTokens: 50 });
  return r.allowed === true;
});
await test('checkBudget blocks huge per-intent call', () => {
  const r = budget.checkBudget({ inputTokens: 100000, outputTokens: 100000 });
  return r.allowed === false && /per-intent cap/.test(r.reason);
});
await test('recordS2Call increments totals', () => {
  const before = budget.getTodaySummary().callCount;
  budget.recordS2Call({ inputTokens: 500, outputTokens: 100, query: 'test' });
  const after = budget.getTodaySummary().callCount;
  return after === before + 1;
});
await test('getTodaySummary reports remaining', () => {
  const s = budget.getTodaySummary();
  return s.remainingUsd <= s.dailyCapUsd && s.remainingUsd >= 0;
});
budget.resetBudget(); // clean up after the test

// ═══ 3. Calibration tracker (graph + fs required, init both) ═══
section('3. Calibration tracker (M3.P3)');

const { graphStore } = await import('/js/kernel/graph-store.js');
const { fileSystem } = await import('/js/kernel/file-system.js');
await fileSystem.init();
await graphStore.init();
const cal = await import('/js/kernel/calibration-tracker.js');

await test('capCategory("files.createFolder") returns "files"',
  () => cal.capCategory('files.createFolder') === 'files');
await test('capCategory("ai.ask") returns "ai"',
  () => cal.capCategory('ai.ask') === 'ai');
await test('capCategory("nullary") returns "nullary"',
  () => cal.capCategory('nullary') === 'nullary');
await test('capCategory(null) returns "unknown"',
  () => cal.capCategory(null) === 'unknown');

await test('recordSample stores a node', async () => {
  const node = await cal.recordSample({
    brain: 's1', capCategory: 'verify-test', ok: true, query: 'hello',
  });
  return node && node.id;
});

// Record 6 samples for a category (5 fails) so escalation triggers.
const FAILCAT = 'fail-test-' + Date.now();
for (let i = 0; i < 6; i++) {
  await cal.recordSample({ brain: 's1', capCategory: FAILCAT, ok: false, query: 'q' + i });
}
await test('shouldEscalate=true after 6 failures', async () => {
  return await cal.shouldEscalate(FAILCAT) === true;
});
await test('getAccuracy reports 0% for failing category', async () => {
  const stats = await cal.getAccuracy('s1', FAILCAT);
  return stats.total >= 6 && stats.successes === 0;
});

// Category with no samples should NOT escalate (insufficient data)
await test('shouldEscalate=false for unknown category (no samples)',
  async () => await cal.shouldEscalate('never-seen-cat-' + Date.now()) === false);

// ═══ 4. Capability registry — required for planner schema check ═══
section('4. Capability registry');
// capability-providers.js registers everything as a top-level side effect
// when imported. No explicit register fn needed.
await import('/js/kernel/capability-providers.js');
const { listCapabilities, getCapability } = await import('/js/kernel/capability-api.js');
const caps = listCapabilities();

await test('registry has at least 5 capabilities', () => caps.length >= 5);
await test('files.createFolder is registered', () => !!getCapability('files.createFolder'));
await test('files.createFile is registered', () => !!getCapability('files.createFile'));

// ═══ 5. Intent planner — stub aiService to return canned plans ═══
section('5. Intent planner with stubbed AI (M2 Agent Core)');
const { planIntent, routeQuery } = await import('/js/kernel/intent-planner.js');

// Stub: planner uses askWithMeta, so stub THAT (not ask). Returns canned
// JSON plan + a meta blob with brain='offline' to keep section 7 honest.
const realAsk = aiService.ask.bind(aiService);
const realAskWithMetaSec5 = aiService.askWithMeta.bind(aiService);
const stubMeta = { brain: 'offline', confidence: 0.3, provider: 'mock', capCategory: 'planner', model: 'mock', escalated: false, responseTimeMs: 1 };
aiService.askWithMeta = async (prompt) => {
  const queryMatch = prompt.match(/USER QUERY: "([^"]+)"/);
  const query = queryMatch ? queryMatch[1] : '';
  if (/folder.*Projects.*Desktop.*file.*ideas/i.test(query)) {
    return { reply: JSON.stringify({
      status: 'plan',
      reasoning: 'create folder then file with content',
      steps: [
        { cap: 'files.createFolder', args: { path: '/Desktop', name: 'Projects' }, binds: 'folderPath' },
        { cap: 'files.createFile', args: { parent: '${binds.folderPath}', name: 'ideas.txt', content: 'Idea 1\nIdea 2\nIdea 3' } },
      ],
    }), meta: stubMeta };
  }
  if (/ambiguous/i.test(query)) {
    return { reply: JSON.stringify({ status: 'clarify', question: 'Which one?', choices: ['A', 'B'] }), meta: stubMeta };
  }
  if (/bad-cap/i.test(query)) {
    return { reply: JSON.stringify({ status: 'plan', steps: [{ cap: 'nonexistent.cap', args: {} }] }), meta: stubMeta };
  }
  return { reply: JSON.stringify({ status: 'plan', steps: [{ cap: 'files.createFolder', args: { path: '/Desktop', name: 'Test' } }] }), meta: stubMeta };
};
// Keep aiService.ask delegating through askWithMeta (already does after refactor).

await test('planner returns valid plan for canned query', async () => {
  const result = await planIntent({
    query: 'create a folder called Projects on the Desktop and put a file called ideas.txt in it',
    context: {}, memory: [], parsedIntent: null,
  });
  return result.status === 'plan' && result.steps.length === 2;
});
await test('planner returns clarify for ambiguous', async () => {
  const result = await planIntent({ query: 'ambiguous task', context: {}, memory: [], parsedIntent: null });
  return result.status === 'clarify';
});
await test('planner rejects unknown capability after retry', async () => {
  const result = await planIntent({ query: 'bad-cap test', context: {}, memory: [], parsedIntent: null });
  return result.status === 'failed';
});
// routeQuery requires a parsedIntent with confidence to take the fast path;
// null parsedIntent always plans (per intent-planner.js:304).
await test('routeQuery sends "open terminal" to fast path',
  () => routeQuery('open terminal', { confidence: 0.9 }) === 'fast');
await test('routeQuery sends compound query to plan path',
  () => routeQuery('create folder X and put file Y in it', { confidence: 0.9 }) === 'plan');
await test('routeQuery sends "X and then Y" to plan path',
  () => routeQuery('open notes and then write hello', { confidence: 0.9 }) === 'plan');

// ═══ 6. Intent executor — run a planned plan end-to-end ═══
section('6. Intent executor end-to-end with binding (M1+Agent Core)');

const intentExecMod = await import('/js/kernel/intent-executor.js');
const { executePlan } = intentExecMod;
intentExecMod.initIntentExecutor(); // wire up the intent:plan + intent:execute handlers
const { eventBus } = await import('/js/kernel/event-bus.js');

const planForExec = {
  status: 'plan',
  steps: [
    { cap: 'files.createFolder', args: { path: '/Desktop', name: 'V03Verify-' + Date.now() }, binds: 'folderPath' },
    { cap: 'files.createFile', args: { parent: '${binds.folderPath}', name: 'verify.txt', content: 'verified' } },
  ],
};

const events = [];
eventBus.on('plan:started', () => events.push('plan:started'));
eventBus.on('plan:step:start', (e) => events.push('plan:step:start:' + e.step.cap));
eventBus.on('plan:step:done', (e) => events.push('plan:step:done:' + e.step.cap));
eventBus.on('plan:completed', () => events.push('plan:completed'));
eventBus.on('plan:failed', (e) => events.push('plan:failed:' + e.error));

const execResult = await executePlan(planForExec, { query: 'verify' });

await test('executor result.ok === true', () => execResult.ok === true);
await test('executor ran 2 steps', () => execResult.results && execResult.results.length === 2);
await test('plan:started event fired', () => events.includes('plan:started'));
await test('plan:completed event fired', () => events.includes('plan:completed'));
await test('plan:step:start fired for files.createFolder',
  () => events.includes('plan:step:start:files.createFolder'));
await test('plan:step:done fired for files.createFile',
  () => events.includes('plan:step:done:files.createFile'));
await test('binding placeholder was resolved before capability ran', () => {
  // The executor preserves the ORIGINAL placeholder in provenance._intent.args
  // for audit, but the RESOLVED args (provenance.args.parent) must be a real
  // path. Check the resolved value.
  const fileResult = execResult.results[1];
  const resolvedParent = fileResult?.provenance?.args?.parent;
  return typeof resolvedParent === 'string'
    && resolvedParent.startsWith('/Desktop/V03Verify-')
    && !resolvedParent.includes('${binds');
});

// ═══ 7. Brain detection: per-call meta + plan.meta wiring ═══
section('7. Brain detection (race-safe per-call meta)');

// Override the section-5 stub with one that returns brain='s2' so we can
// verify plan.meta propagation specifically.
aiService.askWithMeta = async () => ({
  reply: JSON.stringify({ status: 'plan', steps: [{ cap: 'files.createFolder', args: { path: '/Desktop', name: 'BrainTest-' + Date.now() } }] }),
  meta: { brain: 's2', confidence: 0.95, provider: 'anthropic', capCategory: 'planner', model: 'claude-haiku-4-5-20251001', escalated: false, responseTimeMs: 42 },
});
// planIntent already imported in section 5
const planResult = await planIntent({ query: 'simulated', context: {}, memory: [], parsedIntent: null });

await test('planIntent returns plan.meta with brain', () => planResult.meta?.brain === 's2');
await test('planIntent returns plan.meta with provider', () => planResult.meta?.provider === 'anthropic');

// Trigger intent:plan event so the executor's intent:plan handler runs the
// full path: planIntent -> executePlan -> recordSample(brain from plan.meta).
const beforeS2 = (await cal.getAccuracy('s2', 'files')).total;
const planRecorded = new Promise((resolve) => {
  const handler = () => {
    eventBus.off('plan:completed', handler);
    setTimeout(async () => {
      const after = (await cal.getAccuracy('s2', 'files')).total;
      resolve(after > beforeS2);
    }, 300);
  };
  eventBus.on('plan:completed', handler);
});
eventBus.emit('intent:plan', { query: 'simulated brain test', context: {}, parsedIntent: null });
const recorded = await Promise.race([
  planRecorded,
  new Promise((r) => setTimeout(() => r(false), 6000)),
]);
await test('s2-tagged calibration sample landed (brain came from plan.meta)',
  () => recorded === true);

// Restore real ask methods
aiService.ask = realAsk;
aiService.askWithMeta = realAskWithMetaSec5;

// ═══ 8. Spec generator (M4.P1) ═══
section('8. Spec generator (M4.P1)');

const specMod = await import('/js/kernel/spec-generator.js');

// Stub askWithMeta to return a canned spec
const realAskForSpec = aiService.askWithMeta.bind(aiService);
const specStubMeta = { brain: 'offline', confidence: 0.3, provider: 'mock', capCategory: 'spec', model: 'mock', escalated: false, responseTimeMs: 1 };
aiService.askWithMeta = async (prompt) => {
  // Check BAD-INTENT FIRST — the spec generator's prompt also contains
  // "spec generator" in its system preamble, so the happy-path branch
  // would otherwise shadow the bad-input test.
  if (prompt.includes('BAD-INTENT')) {
    return { reply: 'I cannot JSON', meta: specStubMeta };
  }
  if (prompt.includes('spec generator')) {
    return {
      reply: JSON.stringify({
        goal: 'Track daily habits with streak counting',
        acceptance_criteria: [
          'Given the app is open, when the user adds a habit, then it appears in the list.',
          'Given a habit exists, when the user marks it done for today, then the streak counter increments.',
          'Given a habit with a 3-day streak, when the user misses a day, then the streak resets to 0.',
        ],
        non_goals: ['Cloud sync', 'Cross-device notifications'],
        ux_notes: 'Keyboard-first. Space to toggle today. Tab cycles habits.',
        open_questions: [],
      }),
      meta: specStubMeta,
    };
  }
  return realAskForSpec(prompt);
};

await test('generateSpec returns draft status', async () => {
  const r = await specMod.generateSpec('build me a habit tracker');
  return r.status === 'draft' && r.spec?.goal?.length > 0;
});
await test('generateSpec spec has acceptance_criteria array', async () => {
  const r = await specMod.generateSpec('build me a habit tracker');
  return Array.isArray(r.spec.acceptance_criteria) && r.spec.acceptance_criteria.length >= 3;
});
await test('generateSpec rejects bad input after retry', async () => {
  const r = await specMod.generateSpec('BAD-INTENT');
  return r.status === 'failed';
});
await test('generateSpec rejects empty intent', async () => {
  const r = await specMod.generateSpec('');
  return r.status === 'failed' && /empty intent/.test(r.error);
});

// Store + freeze round trip
const draftResult = await specMod.generateSpec('build me a habit tracker');
const storedId = await specMod.storeSpec(draftResult.spec);
await test('storeSpec returns a graph node id', () => typeof storedId === 'string' && storedId.length > 0);

const readBack = await specMod.getSpec(storedId);
await test('getSpec reads back the goal', () => readBack?.goal === draftResult.spec.goal);
await test('getSpec reads back criteria count', () => readBack?.acceptance_criteria?.length === draftResult.spec.acceptance_criteria.length);
await test('newly stored spec is status=draft', () => readBack?.status === 'draft');

const frozen = await specMod.freezeSpec(storedId);
await test('freezeSpec returns updated node', () => !!frozen);
const afterFreeze = await specMod.getSpec(storedId);
await test('freezeSpec sets status=frozen + frozenAt', () => afterFreeze?.status === 'frozen' && typeof afterFreeze.frozenAt === 'number');

// Reject flow
const draft2 = await specMod.generateSpec('build me a habit tracker');
const rejectId = await specMod.storeSpec(draft2.spec);
await specMod.rejectSpec(rejectId, 'too vague');
const rejected = await specMod.getSpec(rejectId);
await test('rejectSpec sets status=rejected with reason',
  () => rejected?.status === 'rejected' && rejected.rejectionReason === 'too vague');

await test('getFrozenSpecByIntent finds approved spec', async () => {
  const found = await specMod.getFrozenSpecByIntent('build me a habit tracker');
  // Multiple test runs accumulate specs — just confirm any frozen one for
  // this intent is returned with the right shape.
  return found && found.status === 'frozen' && found.raw_intent === 'build me a habit tracker';
});
await test('getFrozenSpecByIntent returns null for unknown intent', async () => {
  const found = await specMod.getFrozenSpecByIntent('does not exist-' + Date.now());
  return found === null;
});

// Capability registration
const specGenCap = getCapability('spec.generate');
const specFreezeCap = getCapability('spec.freeze');
await test('spec.generate capability registered', () => !!specGenCap && specGenCap.level === 0);
await test('spec.freeze capability registered with L2 gate', () => !!specFreezeCap && specFreezeCap.level === 2);

aiService.askWithMeta = realAskForSpec;

// ═══ 9. Test generator (M4.P2) ═══
section('9. Test generator (M4.P2 — tests-from-spec)');

const testsMod = await import('/js/kernel/test-generator.js');

// Stub askWithMeta to return BOTH spec and test responses depending on
// which prompt header is being asked. Set this BEFORE calling
// generateSpec so the spec build doesn't fall through to the real
// (mock-provider) path and produce an unparseable reply.
const realAskForTests = aiService.askWithMeta.bind(aiService);
const testsStubMeta = { brain: 'offline', confidence: 0.3, provider: 'mock', capCategory: 'tests', model: 'mock', escalated: false, responseTimeMs: 1 };
const specSubReply = JSON.stringify({
  goal: 'Track daily habits with streak counting',
  acceptance_criteria: [
    'Given the app is open, when the user adds a habit, then it appears in the list.',
    'Given a habit exists, when the user marks it done for today, then the streak counter increments.',
    'Given a habit with a 3-day streak, when the user misses a day, then the streak resets to 0.',
  ],
  non_goals: ['Cloud sync'],
  ux_notes: 'Keyboard-first.',
  open_questions: [],
});
aiService.askWithMeta = async (prompt) => {
  if (prompt.includes('spec generator')) {
    return { reply: specSubReply, meta: testsStubMeta };
  }
  if (prompt.includes('TEST-FAIL-INTENT')) {
    return { reply: 'broken', meta: testsStubMeta };
  }
  if (prompt.includes('test generator')) {
    return {
      reply: JSON.stringify({
        tests: [
          { title: 'add habit puts it in list', setup: 'const a = new App();', act: 'a.add("water");', assert: 'expect(a.list()).toContain("water");', criterionIndex: 0 },
          { title: 'mark done increments streak', setup: 'const a = new App(); a.add("water");', act: 'a.toggle("water","2026-04-18");', assert: 'expect(a.streakOf("water")).toBe(1);', criterionIndex: 1 },
          { title: 'missed day resets streak', setup: 'const a = new App(); a.add("w"); a.toggle("w","2026-04-15");', act: 'a.toggle("w","2026-04-17");', assert: 'expect(a.streakOf("w")).toBe(0);', criterionIndex: 2 },
        ],
      }),
      meta: testsStubMeta,
    };
  }
  return realAskForTests(prompt);
};

// NOW build the spec (stub is in place)
const specForTests = await specMod.generateSpec('build me a habit tracker');
const specForTestsId = await specMod.storeSpec(specForTests.spec);
await specMod.freezeSpec(specForTestsId);

await test('generateTests returns ok status', async () => {
  const r = await testsMod.generateTests(specForTestsId);
  return r.status === 'ok' && Array.isArray(r.suite.tests);
});
await test('generateTests one test per acceptance criterion', async () => {
  const r = await testsMod.generateTests(specForTestsId);
  return r.suite.tests.length === specForTests.spec.acceptance_criteria.length;
});
await test('generateTests rejects unknown spec id', async () => {
  const r = await testsMod.generateTests('non-existent-id-' + Date.now());
  return r.status === 'failed' && /not found/.test(r.error);
});
await test('generateTests rejects draft spec (must be frozen)', async () => {
  const draft = await specMod.generateSpec('build me a habit tracker');
  const draftId = await specMod.storeSpec(draft.spec);
  const r = await testsMod.generateTests(draftId);
  return r.status === 'failed' && /must be frozen/.test(r.error);
});

// Store + lookup round-trip
const genResult = await testsMod.generateTests(specForTestsId);
const suiteId = await testsMod.storeTestSuite(genResult.suite);
await test('storeTestSuite returns a graph node id', () => typeof suiteId === 'string' && suiteId.length > 0);

const storedSuite = await testsMod.getTestSuite(suiteId);
await test('getTestSuite reads tests array back', () => Array.isArray(storedSuite?.tests) && storedSuite.tests.length === 3);
await test('storedSuite preserves specId back-pointer', () => storedSuite?.specId === specForTestsId);

const suitesForSpec = await testsMod.getSuitesForSpec(specForTestsId);
await test('getSuitesForSpec returns at least one suite', () => suitesForSpec.length >= 1);

// recordSuiteRun
await testsMod.recordSuiteRun(suiteId, [
  { index: 0, ok: true, durationMs: 5 },
  { index: 1, ok: false, error: 'expected 1 got 0', durationMs: 7 },
  { index: 2, ok: true, durationMs: 4 },
]);
const afterRun = await testsMod.getTestSuite(suiteId);
await test('recordSuiteRun stores lastRunResults', () => Array.isArray(afterRun.lastRunResults) && afterRun.lastRunResults.length === 3);
await test('recordSuiteRun stores pass count', () => afterRun.lastRunPasses === 2 && afterRun.lastRunTotal === 3);

// Capability registration
const testsGenCap = getCapability('tests.generate');
await test('tests.generate capability registered', () => !!testsGenCap && testsGenCap.level === 0);

// Schema enforcement: count mismatch should be rejected after retry
aiService.askWithMeta = async () => ({
  reply: JSON.stringify({ tests: [{ title: 't', setup: 's', act: 'a', assert: 'e', criterionIndex: 0 }] }),
  meta: testsStubMeta,
});
await test('generateTests rejects count mismatch after retry', async () => {
  const r = await testsMod.generateTests(specForTestsId);
  return r.status === 'failed' && /count|invalid/.test(r.error);
});

// Forbidden token
aiService.askWithMeta = async () => ({
  reply: JSON.stringify({ tests: [0,1,2].map(i => ({ title: 't'+i, setup: 'fetch("/x")', act: 'a', assert: 'e', criterionIndex: i })) }),

section('11. Code generator (M4.P3.b — code-from-tests, iterate)');

const codeMod = await import('/js/kernel/code-generator.js');

// Build a frozen spec + suite first via stubs.
const codeSpecReply = JSON.stringify({
  goal: 'tiny stack',
  acceptance_criteria: [
    'Given an empty stack, when I push an item, then size is 1.',
    'Given a stack with one item, when I pop, then I get the item back and size is 0.',
    'Given an empty stack, when I pop, then I get undefined.',
  ],
  non_goals: [],
  ux_notes: '',
  open_questions: [],
});
const codeTestsReply = JSON.stringify({
  tests: [
    { title: 'push increments size', setup: 'const s = new Stack();', act: 's.push(1);', assert: 'expect(s.size()).toBe(1);', criterionIndex: 0 },
    { title: 'pop returns last and decrements', setup: 'const s = new Stack(); s.push(7);', act: 'const v = s.pop();', assert: 'expect(v).toBe(7); expect(s.size()).toBe(0);', criterionIndex: 1 },
    { title: 'pop on empty returns undefined', setup: 'const s = new Stack();', act: 'const v = s.pop();', assert: 'expect(v === undefined).toBeTruthy();', criterionIndex: 2 },
  ],
});
const codeMeta = { brain: 'offline', confidence: 0.3, provider: 'mock', capCategory: 'code', model: 'mock', escalated: false, responseTimeMs: 1 };

// Counter so the stub can simulate retry-then-pass.
let codeAttemptCounter = 0;
const buggyCode = 'class Stack { constructor() { this.items = []; } push(x) { this.items.push(x); } pop() { return this.items.pop(); } size() { return 999; } }'; // size() lies → first 2 tests fail
const goodCode = 'class Stack { constructor() { this.items = []; } push(x) { this.items.push(x); } pop() { return this.items.pop(); } size() { return this.items.length; } }';

aiService.askWithMeta = async (prompt) => {
  if (prompt.includes('spec generator')) return { reply: codeSpecReply, meta: codeMeta };
  if (prompt.includes('test generator')) return { reply: codeTestsReply, meta: codeMeta };
  if (prompt.includes('code generator')) {
    codeAttemptCounter++;
    // First attempt: buggy. Second attempt: correct.
    return {
      reply: JSON.stringify({
        code: codeAttemptCounter >= 2 ? goodCode : buggyCode,
        summary: codeAttemptCounter >= 2 ? 'fixed size()' : 'first try',
      }),
      meta: codeMeta,
    };
  }
  return realAskForTests(prompt);
};

// Build the spec + suite
const codeSpec = await specMod.generateSpec('build me a stack');
const codeSpecId = await specMod.storeSpec(codeSpec.spec);
await specMod.freezeSpec(codeSpecId);
const codeGenTests = await testsMod.generateTests(codeSpecId);
const codeSuiteId = await testsMod.storeTestSuite(codeGenTests.suite);

// First scenario: bad-then-good code, should converge in 2 attempts
codeAttemptCounter = 0;
const codeRunResult = await codeMod.generateCode(codeSuiteId, { maxAttempts: 3 });

await test('code.generate converges to ok status', () => codeRunResult.status === 'ok');
await test('code.generate uses 2 attempts (bad then good)', () => codeRunResult.attempts === 2);
await test('code.generate final code matches the good Stack class',
  () => codeRunResult.code.includes('this.items.length'));
await test('code.generate finalResults all pass',
  () => codeRunResult.finalResults && codeRunResult.finalResults.passes === codeRunResult.finalResults.total);
await test('code.generate history has both attempts',
  () => codeRunResult.history.length === 2);
await test('code.generate history attempt 1 has failures',
  () => codeRunResult.history[0].results && codeRunResult.history[0].results.passes < codeRunResult.history[0].results.total);

// Storage round-trip
const codeNodeId = await codeMod.storeGeneratedCode(codeSuiteId, codeRunResult);
await test('storeGeneratedCode returns a graph node id', () => typeof codeNodeId === 'string' && codeNodeId.length > 0);
const storedCode = await codeMod.getGeneratedCode(codeNodeId);
await test('getGeneratedCode reads the code back', () => storedCode?.code?.includes('this.items.length'));
await test('storedCode preserves attempts count', () => storedCode?.attempts === 2);

// Failure scenario: code never converges (returns buggy every time)
aiService.askWithMeta = async (prompt) => {
  if (prompt.includes('code generator')) return { reply: JSON.stringify({ code: buggyCode, summary: 'always wrong' }), meta: codeMeta };
  if (prompt.includes('spec generator')) return { reply: codeSpecReply, meta: codeMeta };
  if (prompt.includes('test generator')) return { reply: codeTestsReply, meta: codeMeta };
  return realAskForTests(prompt);
};
const codeFailResult = await codeMod.generateCode(codeSuiteId, { maxAttempts: 2 });
await test('code.generate fails after maxAttempts when never converges',
  () => codeFailResult.status === 'failed' && codeFailResult.attempts === 2);

// Forbidden token rejection
aiService.askWithMeta = async () => ({ reply: JSON.stringify({ code: 'fetch("/x"); class Stack {}', summary: 'bad' }), meta: codeMeta });
const forbiddenResult = await codeMod.generateCode(codeSuiteId, { maxAttempts: 1 });
await test('code.generate rejects forbidden token (treats as failed attempt)',
  () => forbiddenResult.status === 'failed');

// Capability registration
const codeGenCap = getCapability('code.generate');
await test('code.generate capability registered with L1 sandbox',
  () => !!codeGenCap && codeGenCap.level === 1);

aiService.askWithMeta = realAskForTests;

section('12. App promoter (M4.P4)');

// Refusal cases

// Refuse if code didn't all-pass (manufacture a "failed" code node)

// Capability registration

await test('app.promote capability registered with L2 user-approval gate',
  () => !!appPromoteCap && appPromoteCap.level === 2);
await test('app.archive capability registered (L2)',
  () => !!appArchiveCap && appArchiveCap.level === 2);

// ═══ 13. Branching storage layer (M5.P1) ═══
section('13. Branching storage layer (M5.P1)');

const branchMod = await import('/js/kernel/branch-manager.js');

const b = await branchMod.createBranch({ name: 'verify-branch-' + Date.now(), intent: 'sandbox test' });
await test('createBranch returns id + open status', () => b.id && b.status === 'open');

const targetNode = await graphStore.createNode('verify-target', { v: 1 }, { createdBy: { kind: 'system', capabilityId: 'verify' } });
await b.record({ kind: 'updateNode', args: { id: targetNode.id, props: { v: 2 } }, describe: 'bump v' });
await b.record({ kind: 'createNode', args: { type: 'verify-target', props: { v: 99 } }, describe: 'seed' });

const branchAfterRecord = await branchMod.getBranch(b.id);
await test('recordMutation appended 2 mutations', () => branchAfterRecord.pendingMutations.length === 2);

const diff = await branchMod.diffBranch(b.id);
await test('diffBranch reports correct counts', () => diff.counts.updateNode === 1 && diff.counts.createNode === 1);
await test('diffBranch lines length matches mutation count', () => diff.lines.length === 2);

const targetBeforeMerge = await graphStore.getNode(targetNode.id);
await test('live node unchanged before merge', () => targetBeforeMerge.props.v === 1);

const merge = await branchMod.mergeBranch(b.id);
await test('mergeBranch ok with applied count', () => merge.ok && merge.applied === 2);

const afterMerge = await branchMod.getBranch(b.id);
await test('branch transitions to committed status', () => afterMerge.status === 'committed' && typeof afterMerge.committedAt === 'number');

const targetAfterMerge = await graphStore.getNode(targetNode.id);
await test('live node now shows v=2 after merge', () => targetAfterMerge.props.v === 2);

const b2 = await branchMod.createBranch({ name: 'will-discard', intent: 'unwanted' });
await b2.record({ kind: 'updateNode', args: { id: targetNode.id, props: { v: 999 } } });
await branchMod.discardBranch(b2.id, 'user rejected');
const discarded = await branchMod.getBranch(b2.id);
await test('discardBranch sets status=discarded + reason',
  () => discarded.status === 'discarded' && discarded.discardReason === 'user rejected');

const targetAfterDiscard = await graphStore.getNode(targetNode.id);
await test('discard left live node untouched', () => targetAfterDiscard.props.v === 2);

let refused = false;
try { await branchMod.recordMutation(b.id, { kind: 'updateNode', args: { id: targetNode.id, props: { v: 5 } } }); }
catch (err) { refused = /not open/.test(err.message); }
await test('recordMutation refuses on already-merged branch', () => refused);

const helperResult = await branchMod.onBranch({ intent: 'helper test' }, async (record) => {
  await record({ kind: 'createNode', args: { type: 'verify-target', props: { v: 7 } } });
  return 'value-from-fn';
});
await test('onBranch returns branchId + value from fn',
  () => helperResult.branchId && helperResult.value === 'value-from-fn');

const helperBranch = await branchMod.getBranch(helperResult.branchId);
await test('onBranch left the branch open for user to merge/discard',
  () => helperBranch.status === 'open' && helperBranch.pendingMutations.length === 1);

const opens = await branchMod.listBranches('open');
await test('listBranches(open) returns at least the helper branch',
  () => opens.some(x => x.id === helperResult.branchId));
const committed = await branchMod.listBranches('committed');
await test('listBranches(committed) returns at least one item', () => committed.length >= 1);

const branchCreateCap = getCapability('branch.create');
const branchMergeCap = getCapability('branch.merge');
const branchDiscardCap = getCapability('branch.discard');
await test('branch.create capability registered (L0)',
  () => !!branchCreateCap && branchCreateCap.level === 0);
await test('branch.merge capability registered with L2 user-approval gate',
  () => !!branchMergeCap && branchMergeCap.level === 2);
await test('branch.discard capability registered (L1)',
  () => !!branchDiscardCap && branchDiscardCap.level === 1);

// ─── M5.P3 rewind ───
const rewindNode = await graphStore.createNode('verify-rewind-target', { v: 0 });
const rb = await branchMod.createBranch({ name: 'rewind-test', intent: 'will be rewound' });
await rb.record({ kind: 'updateNode', args: { id: rewindNode.id, props: { v: 42 } } });
await rb.record({ kind: 'createNode', args: { type: 'verify-rewind-side', props: { tag: 'created-by-branch' } } });
const rmerge = await branchMod.mergeBranch(rb.id);
await test('rewind setup: branch merged 2 mutations', () => rmerge.ok && rmerge.applied === 2);

const rewindAfterMerge = await graphStore.getNode(rewindNode.id);
await test('rewind setup: live node shows merged value', () => rewindAfterMerge.props.v === 42);

const rewindResult = await branchMod.rewindBranch(rb.id);
await test('rewindBranch returns ok', () => rewindResult.ok);
await test('rewindBranch undid both mutations', () => rewindResult.rewound === 2);

const rewindAfterRewind = await graphStore.getNode(rewindNode.id);
await test('rewindBranch reverted updateNode (props match before)',
  () => rewindAfterRewind.props.v === 0);

const rewoundBranch = await branchMod.getBranch(rb.id);
await test('rewound branch transitions to status=rewound + rewoundAt',
  () => rewoundBranch.status === 'rewound' && typeof rewoundBranch.rewoundAt === 'number');

// rewinding twice should be a no-op error
let rewindTwice = null;
try { await branchMod.rewindBranch(rb.id); }
catch (err) { rewindTwice = err.message; }
await test('rewindBranch refuses to run twice on same branch',
  () => /only committed branches/.test(rewindTwice));

const branchRewindCap = getCapability('branch.rewind');
await test('branch.rewind capability registered with L2 user-approval',
  () => !!branchRewindCap && branchRewindCap.level === 2);

// ═══ 14. Operation interceptor (M5.P2) ═══
section('14. Operation interceptor (M5.P2 — L2+ preview gate)');

const ictrMod = await import('/js/kernel/operation-interceptor.js');
const { LEVEL: LVL } = await import('/js/kernel/capability-api.js');

// Fake L1 capability — should run directly without interception
const fakeL1 = {
  id: 'fake.l1',
  level: LVL.SANDBOX,
  blastRadius: 'none',
  reversibility: 'free',
  execute: async (args) => ({ ok: true, output: { ran: 'l1', args } }),
};
const l1Result = await ictrMod.interceptedExecute(fakeL1, { x: 1 });
await test('interceptedExecute on L1 cap runs directly without preview',
  () => l1Result.ok && l1Result.output.ran === 'l1');

// Fake L2 capability — should emit preview and wait for confirm
const fakeL2 = {
  id: 'fake.l2',
  level: LVL.REAL,
  blastRadius: 'file',
  reversibility: 'bounded',
  summary: 'fake L2 cap',
  execute: async (args) => ({ ok: true, output: { ran: 'l2', args } }),
};

// Auto-confirm after 50ms so the test doesn't hang
let previewSeen = null;
const onPrev = (p) => { previewSeen = p; setTimeout(() => eventBus.emit('interception:confirm', { id: p.id }), 50); };
eventBus.on('interception:preview', onPrev);
const l2Result = await ictrMod.interceptedExecute(fakeL2, { y: 2 });
eventBus.off('interception:preview', onPrev);

await test('L2 preview event fires with cap details',
  () => previewSeen && previewSeen.cap.id === 'fake.l2' && previewSeen.cap.level === 2);
await test('L2 preview includes args verbatim',
  () => previewSeen && previewSeen.args.y === 2);
await test('L2 preview has interception id',
  () => previewSeen && typeof previewSeen.id === 'string' && previewSeen.id.length > 0);
await test('after confirm, capability ran and result is ok',
  () => l2Result.ok && l2Result.output.ran === 'l2');

// Abort path
const onPrev2 = (p) => setTimeout(() => eventBus.emit('interception:abort', { id: p.id, reason: 'user said no' }), 50);
eventBus.on('interception:preview', onPrev2);
const abortedResult = await ictrMod.interceptedExecute(fakeL2, { z: 3 });
eventBus.off('interception:preview', onPrev2);
await test('aborted L2 returns ok=false with reason',
  () => !abortedResult.ok && /aborted: user said no/.test(abortedResult.error));

// Auto-abort timeout
const beforeTimeout = Date.now();
const timeoutResult = await ictrMod.interceptedExecute(fakeL2, { t: 4 }, { timeoutMs: 200 });
const elapsed = Date.now() - beforeTimeout;
await test('timeout aborts the interception within bound',
  () => !timeoutResult.ok && /auto-aborted/.test(timeoutResult.error) && elapsed >= 200 && elapsed < 1500);

// skipInterception bypass
const onPrevShouldNotFire = () => { throw new Error('preview fired despite skipInterception'); };
eventBus.on('interception:preview', onPrevShouldNotFire);
const bypassResult = await ictrMod.interceptedExecute(fakeL2, { b: 5 }, { skipInterception: true });
eventBus.off('interception:preview', onPrevShouldNotFire);
await test('skipInterception=true bypasses the gate',
  () => bypassResult.ok && bypassResult.output.ran === 'l2');

// requestConfirmation directly
const onPrev3 = (p) => setTimeout(() => eventBus.emit('interception:confirm', { id: p.id }), 30);
eventBus.on('interception:preview', onPrev3);
const directConfirm = await ictrMod.requestConfirmation(fakeL2, { d: 6 });
eventBus.off('interception:preview', onPrev3);
await test('requestConfirmation resolves with ok=true on confirm',
  () => directConfirm.ok === true && directConfirm.id);

// ═══ Summary ═══
const total = passCount + failCount;
const summary = document.getElementById('summary');
summary.innerHTML =
  `<strong>${passCount} / ${total} passed</strong>` +
  (failCount === 0
    ? '  —  <span style="color:#a6e3a1">all green</span>'
    : `  —  <span style="color:#f38ba8">${failCount} failed</span>`);
console.log(`[v03-verify] ${passCount}/${total} passed`);
if (failures.length) console.table(failures);
</script>
